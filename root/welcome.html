<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebServer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 48px 36px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }
        h1 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 36px;
            font-weight: 500;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 0;
            margin-bottom: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        .ext-link {
            display: block;
            width: 100%;
            padding: 14px 0;
            border-radius: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.85);
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .ext-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>是时候做出选择了</h1>
        <form action="5" method="post">
            <button class="btn" type="submit">浏览图片</button>
        </form>
        <form action="6" method="post">
            <button class="btn" type="submit">观看视频</button>
        </form>
        <a class="ext-link" href="https://github.com/DiShengOvO/TinyWebServer" target="_blank" rel="noopener noreferrer">GitHub 仓库</a>
    </div>
</body>
</html>
